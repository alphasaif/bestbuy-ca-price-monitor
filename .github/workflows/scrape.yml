name: BestBuy Canada Price Monitor

on:
  schedule:
    - cron: "0 10,22 * * *"

  workflow_dispatch:
    inputs:
      limit:
        description: "Process only first N listings (blank = all)"
        required: false
        default: ""
        type: string
      force:
        description: "Include matched listings too (default skips matched)"
        required: false
        default: false
        type: boolean
      concurrency:
        description: "Max concurrent HTTP requests (default 10)"
        required: false
        default: "10"
        type: string
      dry_run:
        description: "Dry run — don't hit BestBuy or write to Supabase"
        required: false
        default: false
        type: boolean
      listing_id:
        description: "Single-listing dispatch: process exactly this assurant_listings.listing_id (overrides limit/force)"
        required: false
        default: ""
        type: string
      unmatched_only:
        description: "Explicit alias for default cron behavior (no-op when force is unset)"
        required: false
        default: false
        type: boolean

jobs:
  scrape:
    # No browser dependency anymore — runs entirely as HTTP requests via curl_cffi.
    # Typical run is 1-3 min for a full cohort; 15 min is generous safety margin.
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BESTBUY_PRICE_TTL_HOURS: "24"
        run: |
          FLAGS=""
          LISTING_ID="${{ github.event.inputs.listing_id }}"
          if [ -n "$LISTING_ID" ]; then
            FLAGS="$FLAGS --listing-id $LISTING_ID"
          fi
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -n "$LIMIT" ]; then
            FLAGS="$FLAGS --limit $LIMIT"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FLAGS="$FLAGS --force"
          fi
          if [ "${{ github.event.inputs.unmatched_only }}" = "true" ]; then
            FLAGS="$FLAGS --unmatched-only"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          CONCURRENCY="${{ github.event.inputs.concurrency }}"
          if [ -n "$CONCURRENCY" ] && [ "$CONCURRENCY" != "10" ]; then
            FLAGS="$FLAGS --concurrency $CONCURRENCY"
          fi
          echo "Running: python scraper.py $FLAGS"
          python scraper.py $FLAGS

      - name: Upload results CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_id }}
          path: results/
          retention-days: 14

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
